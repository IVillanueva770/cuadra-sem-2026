<!DOCTYPE html>
<html lang="es-AR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:40px;background:#fff;display:flex;gap:50px;align-items:flex-start}.cell{text-align:center}.cap{font:600 14px var(--font-sans);color:var(--fg2);margin-top:12px}.sm{margin-top:14px;display:flex;gap:14px;align-items:center;justify-content:center}</style>
</head><body>
<div id="r"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="logo.jsx"></script>
<script type="text/babel">
const concepts=['cartel1','cartel2','cartel3'];
function T(){return concepts.map(c=>(
  <div className="cell" key={c}>
    <span style={{color:'var(--blue-500)',display:'inline-flex'}}><Sym concept={c} size={150}/></span>
    <div className="sm"><span style={{color:'var(--blue-500)',display:'inline-flex'}}><Sym concept={c} size={48}/></span>
    <span style={{color:'var(--blue-500)',display:'inline-flex',marginLeft:14}}><Sym concept={c} size={28}/></span></div>
    <div className="cap">{c}</div>
  </div>
));}
ReactDOM.createRoot(document.getElementById('r')).render(<T/>);
</script>
</body></html>
