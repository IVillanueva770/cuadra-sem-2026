<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--gray-0); }
  .lbl { font: 600 13px var(--font-sans); color: var(--fg2); margin: 0 0 4px; }
  .sub { font: 400 12px var(--font-sans); color: var(--fg3); margin: 0 0 16px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 7px; padding: 7px 13px; border-radius: var(--radius-sm); font: 600 14px var(--font-sans); }
  .ico { width: 15px; height: 15px; }
  .dot { width:9px;height:9px;border-radius:50%; }
</style>
</head>
<body>
  <p class="lbl">Badges de estado — color + ícono + etiqueta (nunca solo color)</p>
  <p class="sub">Cada estado del sistema combina fondo, ícono y texto para accesibilidad.</p>
  <div class="row">
    <span class="badge" style="background:#ECFDF3;color:#166534"><span class="dot" style="background:#16A34A"></span>Sesión activa</span>
    <span class="badge" style="background:#F3F4F6;color:#4B5563"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Expirada</span>
    <span class="badge" style="background:#FEF6E7;color:#92400E"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>Extendida · pendiente</span>
    <span class="badge" style="background:#FEF2F2;color:#991B1B"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Cobro bloqueado</span>
    <span class="badge" style="background:#F3F4F6;color:#4B5563"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>Fuera de zona</span>
  </div>
</body>
</html>
