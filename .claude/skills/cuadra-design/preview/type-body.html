<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--gray-0); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .line:last-child { border-bottom: 0; }
  .meta { flex: none; width: 116px; font: 500 11px var(--font-mono); color: var(--fg3); }
  .meta b { color: var(--fg2); font-weight: 600; }
</style>
</head>
<body>
  <div class="line"><span class="meta"><b>Body L</b><br>18 / 400 · 1.5</span><span class="body-l">Texto principal — 18px por accesibilidad.</span></div>
  <div class="line"><span class="meta"><b>Body M</b><br>16 / 400</span><span class="body-m">Texto secundario y descripciones de apoyo.</span></div>
  <div class="line"><span class="meta"><b>Body S</b><br>14 / 400</span><span class="body-s">Metadatos, ayudas de campo, notas.</span></div>
  <div class="line"><span class="meta"><b>Overline</b><br>13 / 600 · caps</span><span class="overline">Una iniciativa de la Muni</span></div>
  <div class="line"><span class="meta"><b>Caption</b><br>13 / 500</span><span class="caption">Actualizado hace 2 minutos</span></div>
</body>
</html>
