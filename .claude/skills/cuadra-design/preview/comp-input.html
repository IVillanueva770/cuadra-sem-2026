<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--gray-0); display: flex; gap: 20px; }
  .field { flex: 1; }
  label { display: block; font: 600 14px var(--font-sans); color: var(--fg1); margin-bottom: 6px; }
  .input { width: 100%; min-height: 48px; padding: 0 14px; border-radius: var(--radius-md); border: 1.5px solid var(--border-strong); font: 500 18px var(--font-mono); color: var(--fg1); background: #fff; }
  .input.ok { border-color: var(--blue-500); box-shadow: var(--shadow-focus); }
  .input.err { border-color: var(--error); }
  .help { font: 400 13px var(--font-sans); color: var(--fg3); margin-top: 6px; }
  .help.error { color: var(--error-fg); display:flex; gap:6px; align-items:center; }
  .ico { width:15px;height:15px;flex:none; }
</style>
</head>
<body>
  <div class="field">
    <label for="a">Patente del auto</label>
    <input id="a" class="input ok" value="AB 123 CD">
    <div class="help">Foco visible · 18px para legibilidad</div>
  </div>
  <div class="field">
    <label for="b">Patente del auto</label>
    <input id="b" class="input err" value="AB12">
    <div class="help error">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#991B1B" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
      Revisá la patente — faltan caracteres
    </div>
  </div>
</body>
</html>
