<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--gray-0); display:flex; }
  .pane { flex:1; display:flex; align-items:center; justify-content:center; padding:28px; }
  .light { background:#fff; border-right:1px solid var(--border); }
  .dark { background: var(--blue-700); }
  .mono { background: var(--gray-50); border-right:1px solid var(--border); color: var(--gray-900); }
  img { width: 190px; height:auto; }
  .mono img { width:190px; }
</style>
</head>
<body>
  <div class="pane light"><img src="../assets/cuadra-logo-color.svg" alt="Cuadra full color"></div>
  <div class="pane mono"><img src="../assets/cuadra-logo-mono.svg" alt="Cuadra monocromo"></div>
  <div class="pane dark"><img src="../assets/cuadra-logo-light.svg" alt="Cuadra sobre oscuro"></div>
</body>
</html>
