<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--gray-0); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-1); }
  .sw { flex: 1; height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .sw .name { font-size: 11px; font-weight: 600; opacity: .9; }
  .lbl { font: 600 13px var(--font-sans); color: var(--fg2); margin: 0 0 4px; }
  .sub { font: 400 12px var(--font-sans); color: var(--fg3); margin: 0 0 12px; }
</style>
</head>
<body>
  <p class="lbl">Acento — dorado salteño</p>
  <p class="sub">Montaña y tierra de Salta. Badges, destacados, CTA cálido. Usar con moderación.</p>
  <div class="row">
    <div class="sw" style="background:#FEF6EC;color:#92400E"><span class="name">50</span><span class="hex">#FEF6EC</span></div>
    <div class="sw" style="background:#FCE9CE;color:#92400E"><span class="name">100</span><span class="hex">#FCE9CE</span></div>
    <div class="sw" style="background:#F2B968;color:#92400E"><span class="name">300</span><span class="hex">#F2B968</span></div>
    <div class="sw" style="background:#D97706;color:#fff"><span class="name">500 ★</span><span class="hex">#D97706</span></div>
    <div class="sw" style="background:#B45309;color:#fff"><span class="name">600</span><span class="hex">#B45309</span></div>
    <div class="sw" style="background:#92400E;color:#fff"><span class="name">700</span><span class="hex">#92400E</span></div>
  </div>
</body>
</html>
