<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--gray-0); display:flex; align-items:center; gap:34px; }
  .item { text-align:center; }
  .item img { display:block; margin:0 auto 8px; }
  .cap { font:500 12px var(--font-sans); color: var(--fg3); }
  .s56 { width:56px;height:56px; }
  .i192 { width:72px;height:72px; border-radius:16px; }
  .i512 { width:96px;height:96px; border-radius:22px; }
  .lbl { font: 600 13px var(--font-sans); color: var(--fg2); margin-right: 8px; }
</style>
</head>
<body>
  <div class="item"><img class="s56" src="../assets/cuadra-symbol.svg" alt="Símbolo"><div class="cap">Símbolo · SVG</div></div>
  <div class="item"><img class="i192" src="../assets/cuadra-icon-192.png" alt="Icono 192"><div class="cap">PWA 192px</div></div>
  <div class="item"><img class="i512" src="../assets/cuadra-icon-512.png" alt="Icono 512"><div class="cap">PWA 512px</div></div>
  <div style="max-width:230px">
    <div style="font:700 16px var(--font-sans);color:var(--fg1);margin-bottom:6px">Cartel de estacionamiento</div>
    <div style="font:400 14px var(--font-sans);color:var(--fg2);line-height:1.5">El símbolo es un cartel azul de estacionamiento con un auto minimalista «estacionado» en su lugar. Reconocible en señalización urbana y en tamaños chicos.</div>
  </div>
</body>
</html>
