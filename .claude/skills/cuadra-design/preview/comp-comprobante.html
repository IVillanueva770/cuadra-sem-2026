<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--gray-50); }
  .ticket { width: 320px; background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-1); border: 1px solid var(--border); overflow: hidden; margin: 0 auto; }
  .top { background: var(--blue-500); color: #fff; padding: 14px 18px; display:flex; align-items:center; justify-content:space-between; }
  .top .ok { display:flex; align-items:center; gap:8px; font:700 17px var(--font-sans); }
  .ico { width:18px;height:18px; }
  .num { font-family: var(--font-mono); font-size:13px; opacity:.9; }
  .body { padding: 16px 18px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px 8px; }
  .k { font:500 12px var(--font-sans); color: var(--fg3); text-transform: uppercase; letter-spacing:.03em; }
  .v { font-family: var(--font-mono); font-weight:500; font-size:17px; color: var(--fg1); margin-top:2px; }
  .perf { border-top: 2px dashed var(--border-strong); margin: 14px -18px; }
  .qrrow { display:flex; align-items:center; gap:14px; }
  .qr { width:74px;height:74px;border-radius:8px;border:1px solid var(--border); }
  .qrt { font:400 13px var(--font-sans); color: var(--fg2); }
</style>
</head>
<body>
  <div class="ticket">
    <div class="top">
      <span class="ok"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Pago confirmado</span>
      <span class="num">N° 004821</span>
    </div>
    <div class="body">
      <div class="grid">
        <div><div class="k">Patente</div><div class="v">AB 123 CD</div></div>
        <div><div class="k">Monto</div><div class="v">$ 1.250</div></div>
        <div><div class="k">Activa hasta</div><div class="v">14:30</div></div>
        <div><div class="k">Cuadra</div><div class="v">Balcarce 200</div></div>
      </div>
      <div class="perf"></div>
      <div class="qrrow">
        <img class="qr" src="../assets/qr-placeholder.svg" alt="Código de verificación">
        <span class="qrt">Mostrá este código si te lo piden.<br>Permisionario: <b>R. Gómez</b></span>
      </div>
    </div>
  </div>
</body>
</html>
