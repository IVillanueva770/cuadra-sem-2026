<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--gray-0); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-1); }
  .sw { flex: 1; height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .sw .name { font-size: 11px; font-weight: 600; opacity: .85; }
  .star { position: absolute; margin: -2px 0 0 0; font-size: 11px; }
  .lbl { font: 600 13px var(--font-sans); color: var(--fg2); margin: 0 0 10px; letter-spacing: .02em; }
</style>
</head>
<body>
  <p class="lbl">Azul institucional Muni — escala primaria</p>
  <div class="row">
    <div class="sw" style="background:#EFF5FC;color:#0A3158"><span class="name">50</span><span class="hex">#EFF5FC</span></div>
    <div class="sw" style="background:#DBE9F8;color:#0A3158"><span class="name">100</span><span class="hex">#DBE9F8</span></div>
    <div class="sw" style="background:#BBD3F0;color:#0A3158"><span class="name">200</span><span class="hex">#BBD3F0</span></div>
    <div class="sw" style="background:#8EB6E5;color:#0A3158"><span class="name">300</span><span class="hex">#8EB6E5</span></div>
    <div class="sw" style="background:#3B7DCC;color:#fff"><span class="name">400</span><span class="hex">#3B7DCC</span></div>
    <div class="sw" style="background:#145FB0;color:#fff"><span class="name">500 ★</span><span class="hex">#145FB0</span></div>
    <div class="sw" style="background:#0F4A8B;color:#fff"><span class="name">600</span><span class="hex">#0F4A8B</span></div>
    <div class="sw" style="background:#0C3C70;color:#fff"><span class="name">700</span><span class="hex">#0C3C70</span></div>
    <div class="sw" style="background:#0A3158;color:#fff"><span class="name">800</span><span class="hex">#0A3158</span></div>
    <div class="sw" style="background:#082643;color:#fff"><span class="name">900</span><span class="hex">#082643</span></div>
  </div>
</body>
</html>
