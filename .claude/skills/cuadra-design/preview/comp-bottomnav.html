<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--gray-50); }
  .lbl { font: 600 13px var(--font-sans); color: var(--fg2); margin: 0 0 14px; }
  .nav { display:flex; background:#fff; border-top:1px solid var(--border); border-radius: 0 0 16px 16px; box-shadow: var(--shadow-1); max-width: 380px; }
  .item { flex:1; min-height:48px; padding:9px 4px 11px; display:flex; flex-direction:column; align-items:center; gap:4px; color: var(--fg3); }
  .item.active { color: var(--primary); }
  .ico { width:24px;height:24px; }
  .t { font:600 12px var(--font-sans); }
</style>
</head>
<body>
  <p class="lbl">Bottom navigation — ícono + etiqueta siempre visible (mobile)</p>
  <nav class="nav">
    <div class="item active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="t">Inicio</span></div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="t">Mi cuadra</span></div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span class="t">Comprobantes</span></div>
    <div class="item"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="t">Mi perfil</span></div>
  </nav>
</body>
</html>
